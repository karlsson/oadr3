  /subscriptions:
    get:
      tags:
        - subscriptions
      summary: search subscriptions
      operationId: searchSubscriptions
      description: |
        List all subscriptions.
        May filter results by programID and clientName as query params.
        May filter results by objects as query param. See objectTypes schema.
        Use skip and pagination query params to limit response size.
      security:
        - oAuth2ClientCredentials: [read_ven_objects]
        - bearerAuth: []
      parameters:
        - name: programID
          in: query
          schema:
            $ref: '#/components/schemas/objectID'
          description: filter results to subscriptions with programID.
          required: false
        - name: clientName
          in: query
          schema:
            $ref: '#/components/schemas/clientName'
          description: filter results to subscriptions with clientName.
          required: false
        - name: objects
          in: query
          description: list of objects to subscribe to.
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/objectTypes'
        - name: skip
          in: query
          description: number of records to skip for pagination.
          required: false
          style: form
          explode: true
          schema:
            minimum: 0
            type: integer
            format: int32
        - name: limit
          in: query
          description: maximum number of records to return.
          required: false
          style: form
          explode: true
          schema:
            maximum: 50
            minimum: 0
            type: integer
            format: int32
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: array
                items:
